<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FantasmaVerter PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>FANTASMAVERTER PRO 🔥</h1>

<input type="text" id="urlInput" placeholder="Cola link do YouTube">

<select id="format">
  <option value="mp3">MP3</option>
  <option value="mp4">MP4</option>
</select>

<button onclick="startConversion()" class="convert">⚡ CONVERTER ⚡</button>

<button id="downloadBtn" style="display:none;">⬇ DOWNLOAD</button>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<p id="status">0%</p>

</div>

<script src="script.js"></script>
</body>
</html>
